<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>CaddieAI</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#f5f0e8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#1a2e1a}
    #root{max-width:430px;margin:0 auto;min-height:100vh;background:#f5f0e8}
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
const { useState, useEffect } = React;

// ────── CONFIG ──────────────────────────────────────────────────────────────
const DEFAULT_CLUBS = [
  {name:"Driver",yards:260},{name:"3 Wood",yards:235},{name:"5 Iron",yards:185},
  {name:"6 Iron",yards:175},{name:"7 Iron",yards:163},{name:"8 Iron",yards:150},
  {name:"9 Iron",yards:138},{name:"PW",yards:125},{name:"GW",yards:110},{name:"SW",yards:95}
];

const CLUBS_LIST = ["Driver","2 Wood","3 Wood","4 Wood","5 Wood","7 Wood","2 Iron","3 Iron","4 Iron","5 Iron","6 Iron","7 Iron","8 Iron","9 Iron","PW","GW","SW","LW"];
const BALLS = ["Titleist Pro V1","Titleist AVX","TaylorMade TP5","Callaway Chrome Soft","Generic High","Generic Mid","Generic Budget"];
const LIE_OPTIONS = ["Fairway","Rough","Uphill","Downhill","Ball Above Feet","Ball Below Feet","Divot"];

// Wind arrows - FIXED: headwind points TOWARD golfer
const WIND_ARROWS = [
  ["↖","NW"],["↑","N — headwind (into you)"],["↗","NE"],
  ["←","W — left-to-right"],["⛳",""],["→","E — right-to-left"],
  ["↙","SW"],["↓","S — downwind (away from you)"],["↘","SE"]
];

const SHOT_SYSTEM = `You are an expert golf caddie. Be direct, decisive, practical.

SHOT TYPES:
FADE: Open stance, ball forward, weaken grip, swing out-to-in, hold off release. Lands soft, minimal roll.
DRAW: Closed stance, ball back, strengthen grip, swing in-to-out, forearms roll. More distance, more run.
HIGH: Ball forward, hands neutral, high finish, sweep up. Soft landing, quick stop.
PUNCH/LOW: Ball back, weight forward, hands forward, 50-75% backswing, lead wrist flat, low follow through. Penetrating low flight.

LIE ADJUSTMENTS:
UPHILL: Adds loft — take 1 more club. Match body to slope, swing with the hill.
DOWNHILL: Removes loft — take more lofted club. Weight forward, swing DOWN slope, never lift the ball.
BALL ABOVE FEET: Pulls left — grip down, stand tall, aim right. The draw is coming naturally.
BALL BELOW FEET: Fades right — bend knees, balance first, compact swing. Aim slightly left.

WIND ADJUSTMENTS:
Headwind (into you): Add ~8% distance per 10mph. Club up.
Downwind (away from you): Subtract ~5% per 10mph. Club down.
Crosswind left-to-right: Holds fade, kills draw.
Crosswind right-to-left: Holds draw, kills fade.

COURSE CONDITIONS:
Wet/soft: Ball doesn't run, less carry. Extra club on approaches.
Firm/fast: Ball runs more. Land short of pins, let it release.
Cold: Less distance. Warm: More carry.

Always make smart assumptions for missing info. Talk like a real caddie — confident, direct, useful.`;

async function askCaddie(messages, apiKey) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01"
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 800,
      system: SHOT_SYSTEM,
      messages
    })
  });
  if (!res.ok) throw new Error(res.statusText);
  const d = await res.json();
  return d.content?.[0]?.text || "";
}

const toM = y => Math.round(y * 0.9144);
const toY = m => Math.round(m / 0.9144);
const disp = (yards, unit) => unit === "m" ? toM(yards) : yards;
const fmt = (yards, unit) => disp(yards, unit) + (unit === "m" ? "m" : "y");

// ────── HOOKS ──────────────────────────────────────────────────────────────
function useLocalStorage(key, initial) {
  const [state, setState] = useState(() => {
    try { return JSON.parse(localStorage.getItem(key)) || initial; } catch { return initial; }
  });
  useEffect(() => { localStorage.setItem(key, JSON.stringify(state)); }, [state, key]);
  return [state, setState];
}

// ────── COMPONENTS ──────────────────────────────────────────────────────────
function WindArrows({ selected, onChange, label }) {
  return (
    <div style={{marginBottom:12}}>
      <div style={{fontSize:11,color:"#6b876b",marginBottom:8,fontFamily:"monospace",textTransform:"uppercase",letterSpacing:1}}>{label}</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6}}>
        {WIND_ARROWS.map(([arrow, key]) => key === ""
          ? <div key="c" style={{background:"#e4ddd0",border:"1.5px dashed #b8af9d",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,minHeight:48}}>⛳</div>
          : <div key={key} onClick={() => onChange(selected === key ? "" : key)} style={{background:selected===key?"#2d4a2d":"#ede8dc",border:`1.5px solid ${selected===key?"#2d4a2d":"#c8bfad"}`,borderRadius:10,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:20,minHeight:48,transition:"all 0.15s",color:selected===key?"#fff":"#1a2e1a",fontSize:16}}>
              <div>{arrow}</div>
              {key.length<3 && <div style={{fontSize:8,marginTop:2,textAlign:"center",lineHeight:1}}>{key}</div>}
            </div>
        )}
      </div>
    </div>
  );
}

function Chip({ label, selected, onClick }) {
  return <span onClick={onClick} style={{border:"1.5px solid #c8bfad",borderRadius:20,padding:"6px 14px",fontSize:13,fontWeight:600,cursor:"pointer",display:"inline-block",background:selected?"#2d4a2d":"#ede8dc",color:selected?"#fff":"#3d5c3d",borderColor:selected?"#2d4a2d":"#c8bfad",margin:"2px"}}>{label}</span>;
}

function Loading({ text }) {
  return <div style={{display:"flex",alignItems:"center",gap:10,color:"#6b876b",fontSize:13,padding:"16px 0"}}>
    <div style={{width:16,height:16,border:"2px solid #c8bfad",borderTopColor:"#2d4a2d",borderRadius:"50%",animation:"spin 0.7s linear infinite",flexShrink:0}}/>
    <span>{text}</span>
    <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
  </div>;
}

function AICard({ club, shot, body, cue }) {
  return (
    <div style={{background:"#2d4a2d",borderRadius:16,padding:20,marginTop:14,color:"#fff"}}>
      {club && <div style={{fontSize:32,fontWeight:700,marginBottom:4}}>{club}</div>}
      {shot && <div style={{fontSize:14,color:"#c49a2a",fontWeight:700,marginBottom:14,textTransform:"uppercase"}}>{shot}</div>}
      <div style={{fontSize:13,color:"rgba(245,240,232,0.85)",lineHeight:1.7,marginBottom:body&&cue?14:0,whiteSpace:"pre-wrap"}}>{body}</div>
      {cue && <div style={{paddingTop:14,borderTop:"1px solid rgba(255,255,255,0.15)"}}>
        <div style={{fontSize:10,color:"#c49a2a",fontFamily:"monospace",textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>Pre-Shot Cue</div>
        <div style={{fontSize:14,fontStyle:"italic",lineHeight:1.6}}>{cue}</div>
      </div>}
    </div>
  );
}

// ────── PAGES ───────────────────────────────────────────────────────────────
function PreShotPage({ bag, roundInfo, unit, apiKey }) {
  const [pin, setPin] = useState("");
  const [front, setFront] = useState("");
  const [lie, setLie] = useState("");
  const [wind, setWind] = useState("");
  const [windSpd, setWindSpd] = useState("");
  const [loading, setLoading] = useState(false);
  const [rec, setRec] = useState(null);

  const getRec = async () => {
    if (!pin || !apiKey) return alert("Need pin distance and API key");
    setLoading(true);
    try {
      const pinY = unit === "m" ? toY(parseFloat(pin)) : parseFloat(pin);
      const frontY = front ? (unit === "m" ? toY(parseFloat(front)) : parseFloat(front)) : null;
      const bagStr = bag.length ? bag.map(c=>`${c.name}: ${c.yards}y`).join(", ") : "Standard clubs";
      const prompt = `Shot:\nPin: ${Math.round(pinY)}y${frontY?`\nFront: ${Math.round(frontY)}y`:""}${lie?`\nLie: ${lie}`:""}\nWind: ${wind||"calm"} ${windSpd||"0"}mph\nBall: ${roundInfo.ball||"standard"}\nBag: ${bagStr}\n\nFormat:\nCLUB: [name]\nSHOT: [type]\nWHY: [1 sentence]\nCUE: [2-3 short cues]`;
      const text = await askCaddie([{ role: "user", content: prompt }], apiKey);
      const get = k => { const l = text.split("\n"); const i = l.findIndex(x=>x.startsWith(k)); if(i===-1)return ""; let v=l[i].replace(k,"").trim(); for(let j=i+1;j<l.length;j++){if(/^(CLUB|SHOT|WHY|CUE):/.test(l[j]))break;v+=" "+l[j].trim();} return v.trim(); };
      setRec({ club:get("CLUB:"), shot:get("SHOT:"), why:get("WHY:"), cue:get("CUE:") });
    } catch(e) { alert("Error: " + e.message); }
    setLoading(false);
  };

  return (
    <div style={{padding:"18px 20px",paddingBottom:80}}>
      <h2 style={{fontSize:18,marginBottom:14,color:"#2d4a2d"}}>Pre-Shot Planner</h2>
      <div style={{background:"#fff",border:"1px solid #c8bfad",borderRadius:16,padding:16,marginBottom:14}}>
        <div style={{marginBottom:12}}>
          <label style={{fontSize:11,color:"#6b876b",marginBottom:5,fontFamily:"monospace",textTransform:"uppercase",letterSpacing:"0.8px",display:"block"}}>Pin Distance ({unit})*</label>
          <input type="number" placeholder={unit==="m"?"148":"162"} value={pin} onChange={e=>setPin(e.target.value)} style={{background:"#ede8dc",border:"1px solid #c8bfad",borderRadius:10,color:"#1a2e1a",fontSize:15,fontWeight:500,padding:"11px 13px",width:"100%",outline:"none"}}/>
        </div>
        <div style={{marginBottom:12}}>
          <label style={{fontSize:11,color:"#6b876b",marginBottom:5,fontFamily:"monospace",textTransform:"uppercase",letterSpacing:"0.8px",display:"block"}}>Front Distance ({unit})</label>
          <input type="number" placeholder="optional" value={front} onChange={e=>setFront(e.target.value)} style={{background:"#ede8dc",border:"1px solid #c8bfad",borderRadius:10,color:"#1a2e1a",fontSize:15,fontWeight:500,padding:"11px 13px",width:"100%",outline:"none"}}/>
        </div>
        <div style={{marginBottom:12}}>
          <label style={{fontSize:11,color:"#6b876b",marginBottom:5,fontFamily:"monospace",textTransform:"uppercase",letterSpacing:"0.8px",display:"block"}}>Lie</label>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>{LIE_OPTIONS.map(l=><Chip key={l} label={l} selected={lie===l} onClick={()=>setLie(lie===l?"":l)}/>)}</div>
        </div>
        <div style={{marginBottom:12}}>
          <label style={{fontSize:11,color:"#6b876b",marginBottom:5,fontFamily:"monospace",textTransform:"uppercase",letterSpacing:"0.8px",display:"block"}}>Wind Direction</label>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6,marginBottom:10}}>
            {[["↑","Headwind (into)"],["⛳","Calm"],["↓","Downwind (away)"]].map(([a,l])=><div key={l} onClick={()=>setWind(l)} style={{background:wind===l?"#2d4a2d":"#ede8dc",border:`1.5px solid ${wind===l?"#2d4a2d":"#c8bfad"}`,borderRadius:10,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:18,minHeight:48,color:wind===l?"#fff":"#1a2e1a"}}>
              <div>{a}</div>
              <div style={{fontSize:9,marginTop:2}}>{l}</div>
            </div>)}
          </div>
          <div style={{marginBottom:12}}>
            <label style={{fontSize:11,color:"#6b876b",marginBottom:5,fontFamily:"monospace",textTransform:"uppercase",letterSpacing:"0.8px",display:"block"}}>Speed (mph)</label>
            <input type="number" placeholder="0" value={windSpd} onChange={e=>setWindSpd(e.target.value)} style={{background:"#ede8dc",border:"1px solid #c8bfad",borderRadius:10,color:"#1a2e1a",fontSize:15,fontWeight:500,padding:"11px 13px",width:"100%",outline:"none"}}/>
          </div>
        </div>
        <button onClick={getRec} disabled={loading||!pin} style={{background:"#2d4a2d",color:"#f5f0e8",border:"none",borderRadius:12,padding:"14px 20px",fontFamily:"-apple-system,sans-serif",fontSize:15,fontWeight:700,cursor:"pointer",width:"100%"}}>{loading?"Reading...":"Ask Caddie"}</button>
      </div>
      {loading && <Loading text="Weighing it up..."/>}
      {rec && <AICard club={rec.club} shot={rec.shot} body={rec.why} cue={rec.cue}/>}
    </div>
  );
}

function ReviewPage({ shots, setShotRound }) {
  const good = shots.filter(s=>s.result==="good").length;
  const bad = shots.filter(s=>s.result==="bad").length;
  const misses = shots.filter(s=>s.miss).map(s=>s.miss).reduce((a,m)=>{a[m]=(a[m]||0)+1;return a},{});
  const topMiss = Object.entries(misses).sort((a,b)=>b[1]-a[1])[0];

  if (shots.length === 0) return (
    <div style={{padding:"18px 20px",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:400,gap:12}}>
      <div style={{fontSize:48}}>⛳</div>
      <div style={{color:"#6b876b",fontSize:14,textAlign:"center"}}>No shots logged yet. Start on Pre-Shot to log your round.</div>
    </div>
  );

  return (
    <div style={{padding:"18px 20px",paddingBottom:80}}>
      <h2 style={{fontSize:18,marginBottom:14,color:"#2d4a2d"}}>Round Summary · {shots.length} shots</h2>
      <div style={{background:"#fff",border:"1px solid #c8bfad",borderRadius:16,padding:16,marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",padding:"10px 0",borderBottom:"1px solid #c8bfad"}}>
          <span>Solid</span><span style={{fontFamily:"monospace",fontWeight:700,color:"#2d7a2d"}}>{good}</span>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",padding:"10px 0",borderBottom:"1px solid #c8bfad"}}>
          <span>Misses</span><span style={{fontFamily:"monospace",fontWeight:700,color:"#c0392b"}}>{bad}</span>
        </div>
        {topMiss && <div style={{display:"flex",justifyContent:"space-between",padding:"10px 0"}}>
          <span>Most common miss</span><span style={{fontFamily:"monospace",fontWeight:700,color:"#8b6914"}}>{topMiss[0]} ×{topMiss[1]}</span>
        </div>}
      </div>

      <h3 style={{fontSize:14,marginBottom:10,color:"#2d4a2d"}}>Shots Logged</h3>
      {shots.map((s,i)=>(
        <div key={i} style={{background:"#fff",border:"1px solid #c8bfad",borderRadius:10,padding:"10px 14px",marginBottom:6,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontWeight:700,fontSize:14}}>{s.club} <span style={{fontWeight:400,color:"#6b876b",fontSize:12}}>{s.shot}</span></div>
            <div style={{fontSize:11,color:"#6b876b",marginTop:2}}>{s.dist}y · {s.lie}</div>
          </div>
          <div style={{width:10,height:10,borderRadius:"50%",background:s.result==="good"?"#2d7a2d":s.result==="bad"?"#c0392b":"#8b6914"}}/>
        </div>
      ))}

      <button onClick={()=>setShotRound([])} style={{marginTop:20,background:"transparent",color:"#c0392b",border:"1px solid #e8c4c0",borderRadius:12,padding:"12px 20px",fontFamily:"-apple-system,sans-serif",fontSize:13,fontWeight:700,cursor:"pointer",width:"100%"}}>Clear Round</button>
    </div>
  );
}

// ────── MAIN APP ────────────────────────────────────────────────────────────
function App() {
  const [user, setUser] = useLocalStorage("caddieai_user", null);
  const [name, setName] = useState("");
  const [unit, setUnit] = useLocalStorage("caddieai_unit", "y");
  const [apiKey, setApiKey] = useLocalStorage("caddieai_apikey", "");
  const [bag, setBag] = useLocalStorage("caddieai_bag", DEFAULT_CLUBS);
  const [roundInfo, setRoundInfo] = useLocalStorage("caddieai_round", { ball: "" });
  const [shotRound, setShotRound] = useLocalStorage("caddieai_shots", []);
  const [tab, setTab] = useState("preshot");

  const handleSignIn = () => {
    if (!name.trim()) return alert("Enter your name");
    setUser({ name: name.trim(), createdAt: new Date().toISOString() });
    setName("");
  };

  // Sign in screen
  if (!user) {
    return (
      <div style={{maxWidth:430,margin:"0 auto",minHeight:"100vh",background:"#f5f0e8",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20}}>
        <div style={{fontSize:48,marginBottom:20}}>⛳</div>
        <div style={{fontSize:28,fontWeight:700,color:"#2d4a2d",marginBottom:8}}>CaddieAI</div>
        <div style={{fontSize:14,color:"#6b876b",marginBottom:24,textAlign:"center"}}>Your personal AI golf caddie</div>
        
        <div style={{background:"#fff",border:"1px solid #c8bfad",borderRadius:16,padding:24,width:"100%",maxWidth:350}}>
          <div style={{marginBottom:12}}>
            <label style={{fontSize:11,color:"#6b876b",marginBottom:5,fontFamily:"monospace",textTransform:"uppercase",letterSpacing:"0.8px",display:"block"}}>Your Name</label>
            <input placeholder="Enter your name" value={name} onChange={e=>setName(e.target.value)} onKeyPress={e=>e.key==="Enter"&&handleSignIn()} style={{background:"#ede8dc",border:"1px solid #c8bfad",borderRadius:10,color:"#1a2e1a",fontSize:15,fontWeight:500,padding:"11px 13px",width:"100%",outline:"none"}}/>
          </div>
          <div style={{marginBottom:12}}>
            <label style={{fontSize:11,color:"#6b876b",marginBottom:5,fontFamily:"monospace",textTransform:"uppercase",letterSpacing:"0.8px",display:"block"}}>Anthropic API Key</label>
            <input type="password" placeholder="Your API key" value={apiKey} onChange={e=>setApiKey(e.target.value)} style={{background:"#ede8dc",border:"1px solid #c8bfad",borderRadius:10,color:"#1a2e1a",fontSize:15,fontWeight:500,padding:"11px 13px",width:"100%",outline:"none"}}/>
            <div style={{fontSize:10,color:"#6b876b",marginTop:4}}>Get at console.anthropic.com</div>
          </div>
          <button onClick={handleSignIn} style={{background:"#2d4a2d",color:"#f5f0e8",border:"none",borderRadius:12,padding:"14px 20px",fontFamily:"-apple-system,sans-serif",fontSize:15,fontWeight:700,cursor:"pointer",width:"100%"}}>Start</button>
        </div>
      </div>
    );
  }

  // Main app
  return (
    <div style={{maxWidth:430,margin:"0 auto",minHeight:"100vh",background:"#f5f0e8"}}>
      <div style={{padding:"14px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:"1px solid #c8bfad"}}>
        <div>
          <div style={{fontSize:14,fontWeight:700,color:"#2d4a2d"}}>CaddieAI</div>
          <div style={{fontSize:11,color:"#6b876b"}}>Hi, {user.name}</div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <div style={{display:"flex",background:"#ede8dc",border:"1px solid #c8bfad",borderRadius:16,padding:3,gap:2}}>
            {["y","m"].map(u=><button key={u} onClick={()=>setUnit(u)} style={{background:unit===u?"#2d4a2d":"none",color:unit===u?"#f5f0e8":"#6b876b",border:"none",padding:"4px 10px",borderRadius:12,fontFamily:"monospace",fontSize:10,fontWeight:500,cursor:"pointer"}}>{u}</button>)}
          </div>
          <button onClick={()=>{setUser(null);setShotRound([]);}} style={{background:"none",border:"1px solid #c8bfad",borderRadius:10,padding:"6px 12px",fontSize:12,color:"#6b876b",cursor:"pointer"}}>Sign Out</button>
        </div>
      </div>

      <div style={{display:"flex",borderBottom:"1px solid #c8bfad"}}>
        {["preshot","review"].map(t=>(
          <button key={t} onClick={()=>setTab(t)} style={{flex:1,background:"none",border:"none",padding:"12px",fontFamily:"-apple-system,sans-serif",fontSize:13,fontWeight:700,color:tab===t?"#2d4a2d":"#6b876b",cursor:"pointer",borderBottom:`2px solid ${tab===t?"#2d4a2d":"transparent"}`,textTransform:"uppercase",letterSpacing:"0.5px"}}>
            {t==="preshot"?"⛳ Pre-Shot":"📊 Review"}
          </button>
        ))}
      </div>

      {tab==="preshot" && <PreShotPage bag={bag} roundInfo={roundInfo} unit={unit} apiKey={apiKey}/>}
      {tab==="review" && <ReviewPage shots={shotRound} setShotRound={setShotRound}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
